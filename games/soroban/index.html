<!DOCTYPE html>
<html>
<head>
    <title>Cálculo mental</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <!-- Top Banner -->
        <div class="top-banner">
            <a href="../../index.html">&lt; Volver a inicio</a>
            <button onclick="toggleSettings()">⚙️ Ajustes</button>
        </div>

        <!-- Score Banner -->
        <div class="indicators">
            <span>Correctas <span id="buenas">0</span>&nbsp;&nbsp;-&nbsp;</span>
            <span><span id="malas">0</span> Incorrectas</span>
            <br>
            <span class="indicators_small">Frecuencia: <span id="velocidad">0.5</span> s</span>&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp; 
            <span class="indicators_small">Secuencia: <span id="valores">4</span> núm</span>
        </div>

        <!-- Numbers Display -->
        <div id="sub-container">
            <span id="cifras" class="numeros">&nbsp;</span>
            <div id="answerContainer" style="display: none;">
                <input type="number" id="userAnswer">
                <button onclick="validarRespuesta()" class="button-3d" id="validarButton">✅ Validar</button>
                <div class="retro" id="retro"></div>
            </div>
            <span class="retro" id="resultado"></span>
        </div>

        <!-- Control Buttons -->
        <div id="controls">
            <div class="subcontrols">
                <button onclick="reDisplay()" class="button-3d" id="repeatButton" style="display: none;">🔁 Repetir</button>
                <button onclick="verResultado()" class="button-3d" id="showResultButton" style="display: none;">👀 Resultado</button>
            </div>
            <div class="subcontrols">
                <button onclick="todo()" class="button-3d" id="generateButton">🎲 Generar</button>
            </div>
        </div>

        <div id="inferior">
            <div class="donation-banner">
                Si esta aplicación te resultó útil, puedes <a href="https://paypal.me/edgartpan?country.x=MX&locale.x=es_XC" target="_blank">donar aquí</a>
            </div>
        </div>

        <!-- Settings Overlay + Panel -->
        <div id="settingsOverlay" style="display: none;"></div>
        <div id="settingsPanel" style="display: none;">
            <button onclick="cancelSettings()" class="close-btn">&#x2715;</button>
            <div class="title">
                <span>Ajustes</span>
            </div>
            <label for="maxValue">Valor Máximo:</label>
            <input type="number" id="maxValue" value="15">
            <br>
            <label for="delay">Delay (segundos):</label>
            <input type="number" id="delay" value="0.5" step="0.1">
            <br>
            <label for="numCount">Número de cifras:</label>
            <input type="number" id="numCount" value="4">
            <br>
            <input type="checkbox" id="increaseSpeed">
            <label for="increaseSpeed">➕ velocidad</label>
            <br>
            <input type="checkbox" id="increaseSequence">
            <label for="increaseSequence">➕ no. de cifras</label>
            <br><br>
            <div style="text-align: center;">
                <button onclick="applySettings()" class="button-3d" style="width: auto; padding: 10px 40px;">OK</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
